<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game</title>
  <style>
    /* ===== FONTS ===== */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --panel:     #151820;
      --border:    #1e2a38;
      --green:     #39ff7a;
      --green-dim: #1a7a3d;
      --food:      #ff5757;
      --text:      #c8e6c9;
      --gold:      #ffd740;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* ===== HEADER ===== */
    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 4vw, 1.8rem);
      color: var(--green);
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 0 0 18px var(--green);
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 22px;
      text-align: center;
      opacity: 0.7;
    }

    /* ===== STATS BAR ===== */
    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
    }
    .stat-label { color: #556; font-size: 0.6rem; display: block; margin-bottom: 4px; }
    .stat-value { color: var(--gold); }

    /* ===== CANVAS WRAPPER ===== */
    .canvas-wrapper {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(57,255,122,0.12), inset 0 0 30px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
      background: var(--panel);
      border-radius: 4px;
    }

    /* ===== OVERLAY (start / game over) ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,12,18,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      text-align: center;
      padding: 24px;
      gap: 14px;
    }
    .overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.85rem, 3vw, 1.3rem);
      color: var(--green);
      text-shadow: 0 0 14px var(--green);
    }
    .overlay p {
      font-size: 1.3rem;
      color: var(--text);
      opacity: 0.8;
    }
    .overlay .final-score {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--gold);
    }
    .overlay button {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      background: var(--green);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 14px var(--green);
    }
    .overlay button:hover {
      transform: scale(1.06);
      box-shadow: 0 0 28px var(--green);
    }

    /* ===== CONTROLS ===== */
    .controls {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* d-pad for mobile */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
      margin-top: 18px;
    }
    .dpad button {
      background: var(--border);
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      color: var(--green);
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .dpad button:active { background: #1e3a2a; }
    .dpad .up    { grid-column: 2; grid-row: 1; }
    .dpad .left  { grid-column: 1; grid-row: 2; }
    .dpad .right { grid-column: 3; grid-row: 2; }
    .dpad .down  { grid-column: 2; grid-row: 3; }

    .speed-btns button {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      background: var(--border);
      color: var(--text);
      border: 1px solid #2a3a4a;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .speed-btns button.active {
      background: var(--green-dim);
      color: var(--green);
      border-color: var(--green);
    }

    .hint {
      margin-top: 14px;
      font-size: 1rem;
      color: #445;
      text-align: center;
    }

    /* ===== BACK LINK ===== */
    .back-link {
      margin-top: 28px;
      font-size: 1rem;
      color: #445;
    }
    .back-link a {
      color: var(--green);
      text-decoration: none;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<h1>🐍 SNAKE</h1>
<p class="subtitle">Classic arcade action</p>

<!-- Score / High Score -->
<div class="stats">
  <div>
    <span class="stat-label">SCORE</span>
    <span class="stat-value" id="score-display">0</span>
  </div>
  <div>
    <span class="stat-label">HIGH SCORE</span>
    <span class="stat-value" id="hi-display">0</span>
  </div>
  <div>
    <span class="stat-label">LEVEL</span>
    <span class="stat-value" id="level-display">1</span>
  </div>
</div>

<!-- Canvas -->
<div class="canvas-wrapper">
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <!-- Start overlay -->
  <div class="overlay" id="start-overlay">
    <h2>READY?</h2>
    <p>Use arrow keys or the D-pad below<br/>to control the snake.</p>
    <p>Eat 🔴 food to grow and score points.<br/>Don't hit a wall or yourself!</p>
    <button id="start-btn">START GAME</button>
    <div class="speed-btns controls" id="speed-select">
      <button data-speed="slow">SLOW</button>
      <button data-speed="normal" class="active">NORMAL</button>
      <button data-speed="fast">FAST</button>
    </div>
  </div>

  <!-- Game over overlay -->
  <div class="overlay" id="gameover-overlay" style="display:none;">
    <h2>GAME OVER</h2>
    <p>Final Score:</p>
    <div class="final-score" id="final-score">0</div>
    <button id="restart-btn">PLAY AGAIN</button>
  </div>
</div>

<!-- Mobile D-pad -->
<div class="dpad">
  <button class="up"    id="btn-up">▲</button>
  <button class="left"  id="btn-left">◀</button>
  <button class="right" id="btn-right">▶</button>
  <button class="down"  id="btn-down">▼</button>
</div>

<p class="hint">Desktop: Arrow keys &nbsp;|&nbsp; Mobile: D-pad above</p>

<div class="back-link">
  ← <a href="scratch.html">Back to FSY Page</a>
</div>

<!-- ========================================
     SNAKE GAME JAVASCRIPT
     ======================================== -->
<script>
  const canvas  = document.getElementById('gameCanvas');
  const ctx     = canvas.getContext('2d');

  const COLS = 20, ROWS = 20;
  const CELL = canvas.width / COLS;   // 20px per cell

  const SPEEDS = { slow: 200, normal: 130, fast: 75 };

  let snake, dir, nextDir, food, score, hiScore, level, gameLoop, running, speed;

  hiScore = 0;
  speed   = SPEEDS.normal;

  /* ---- colour helpers ---- */
  function hsl(h,s,l){ return `hsl(${h},${s}%,${l}%)`; }

  /* ---- draw grid ---- */
  function drawGrid(){
    ctx.fillStyle = '#151820';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = 'rgba(30,42,56,0.6)';
    ctx.lineWidth = 0.5;
    for(let c=0;c<=COLS;c++){
      ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,canvas.height); ctx.stroke();
    }
    for(let r=0;r<=ROWS;r++){
      ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(canvas.width,r*CELL); ctx.stroke();
    }
  }

  /* ---- draw rounded cell ---- */
  function roundRect(x,y,w,h,r,fill){
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.roundRect(x+1,y+1,w-2,h-2,r);
    ctx.fill();
  }

  /* ---- draw snake ---- */
  function drawSnake(){
    snake.forEach((seg,i)=>{
      const isHead = i === 0;
      const ratio  = 1 - (i / snake.length) * 0.55;
      const green  = Math.round(255 * ratio);
      const color  = isHead ? '#39ff7a' : `rgb(0,${green},60)`;
      roundRect(seg.x*CELL, seg.y*CELL, CELL, CELL, isHead ? 5 : 3, color);

      if(isHead){
        // eyes
        ctx.fillStyle = '#000';
        const ex = dir.x === 1 ? 0.65 : dir.x === -1 ? 0.1 : 0.25;
        const ey = dir.y === 1 ? 0.65 : dir.y === -1 ? 0.1 : 0.25;
        const ex2= dir.x === 1 ? 0.65 : dir.x === -1 ? 0.1 : 0.65;
        const ey2= dir.y === 1 ? 0.65 : dir.y === -1 ? 0.1 : 0.65;
        ctx.beginPath(); ctx.arc(seg.x*CELL+ex*CELL, seg.y*CELL+ey*CELL, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(seg.x*CELL+ex2*CELL,seg.y*CELL+ey2*CELL,2.2, 0, Math.PI*2); ctx.fill();
      }
    });
  }

  /* ---- draw food ---- */
  function drawFood(){
    const cx = food.x*CELL + CELL/2;
    const cy = food.y*CELL + CELL/2;
    const r  = CELL/2 - 2;

    // glow
    const grad = ctx.createRadialGradient(cx,cy,1,cx,cy,r+4);
    grad.addColorStop(0,'rgba(255,87,87,0.45)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,r+4,0,Math.PI*2); ctx.fill();

    ctx.fillStyle = '#ff5757';
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(cx-r*0.3, cy-r*0.3, r*0.3, 0, Math.PI*2); ctx.fill();
  }

  /* ---- place food (not on snake) ---- */
  function placeFood(){
    let pos;
    do {
      pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
    } while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
    food = pos;
  }

  /* ---- init game state ---- */
  function initGame(){
    snake   = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir     = {x:1, y:0};
    nextDir = {x:1, y:0};
    score   = 0;
    level   = 1;
    placeFood();
    updateHUD();
  }

  /* ---- HUD ---- */
  function updateHUD(){
    document.getElementById('score-display').textContent = score;
    document.getElementById('hi-display').textContent    = hiScore;
    document.getElementById('level-display').textContent = level;
  }

  /* ---- main tick ---- */
  function tick(){
    dir = {...nextDir};

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){ endGame(); return; }
    // self collision
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){ endGame(); return; }

    snake.unshift(head);

    if(head.x===food.x&&head.y===food.y){
      score += 10 * level;
      if(score > hiScore) hiScore = score;
      // level up every 5 food
      if(score % 50 === 0){
        level++;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, Math.max(50, speed - (level-1)*10));
      }
      placeFood();
    } else {
      snake.pop();
    }

    drawGrid();
    drawFood();
    drawSnake();
    updateHUD();
  }

  /* ---- end game ---- */
  function endGame(){
    clearInterval(gameLoop);
    running = false;
    document.getElementById('final-score').textContent = score;
    document.getElementById('gameover-overlay').style.display = 'flex';
  }

  /* ---- start game ---- */
  function startGame(){
    document.getElementById('start-overlay').style.display   = 'none';
    document.getElementById('gameover-overlay').style.display = 'none';
    initGame();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
    running  = true;
  }

  /* ---- keyboard ---- */
  document.addEventListener('keydown', e => {
    if(!running) return;
    const map = {
      ArrowUp:    {x:0,y:-1}, ArrowDown:  {x:0,y:1},
      ArrowLeft:  {x:-1,y:0}, ArrowRight: {x:1,y:0}
    };
    if(map[e.key]){
      e.preventDefault();
      const d = map[e.key];
      // prevent reversing
      if(d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  });

  /* ---- D-pad buttons ---- */
  const dpadMap = {
    'btn-up':    {x:0,y:-1}, 'btn-down':  {x:0,y:1},
    'btn-left':  {x:-1,y:0}, 'btn-right': {x:1,y:0}
  };
  Object.entries(dpadMap).forEach(([id, d])=>{
    document.getElementById(id).addEventListener('click', ()=>{
      if(!running) return;
      if(d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    });
  });

  /* ---- speed selector ---- */
  document.querySelectorAll('#speed-select button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#speed-select button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      speed = SPEEDS[btn.dataset.speed];
    });
  });

  /* ---- button actions ---- */
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);

  /* ---- draw initial idle frame ---- */
  drawGrid();
</script>

</body>
</html>
